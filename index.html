<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的视频网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        .header {
            background-color: #333;
            padding: 15px;
            text-align: center;
            color: white;
        }
        .search-box {
            margin: 10px auto;
            width: 80%;
            max-width: 600px;
            display: flex;
        }
        .search-input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        .search-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        .search-btn:hover {
            background-color: #0056b3;
        }
        .container {
            width: 90%;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .video-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .video-cover {
            width: 100%;
            height: 150px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            object-fit: cover;
        }
        .video-info {
            padding: 10px;
        }
        .video-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .video-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }
        .player {
            width: 90%;
            margin: 20px auto;
            text-align: center;
            display: none;
        }
        .player video {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>我的视频网站</h1>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="输入视频标题搜索...">
            <button class="search-btn" onclick="searchVideos()">搜索</button>
        </div>
    </div>

    <div class="player" id="videoPlayer">
        <h3 id="playerTitle"></h3>
        <br>
        <video controls id="playVideo">
            <source src="" type="video/mp4">
            你的浏览器不支持视频播放
        </video>
    </div>

    <div class="container" id="videoContainer">
        <!-- 修复：传参格式改为 标题, 视频路径 -->
        <div class="video-card" onclick="playVideo('现在的人都玩得这么抽象吗', '现在的人都玩得这么抽象吗.mp4')">
            <div class="video-cover">抽象视频封面</div>
            <div class="video-info">
                <div class="video-title">现在的人都玩得这么抽象吗</div>
                <div class="video-desc">趣味搞笑视频，看看大家都在玩什么</div>
            </div>
        </div>
        <div class="video-card" onclick="playVideo('HTML+CSS快速做网页', 'video2.mp4')">
            <div class="video-cover">视频2封面</div>
            <div class="video-info">
                <div class="video-title">HTML+CSS快速做网页</div>
                <div class="video-desc">30分钟做出第一个静态网页，零门槛</div>
            </div>
        </div>
        <div class="video-card" onclick="playVideo('JavaScript交互实战', 'video3.mp4')">
            <div class="video-cover">视频3封面</div>
            <div class="video-info">
                <div class="video-title">JavaScript交互实战</div>
                <div class="video-desc">实现按钮点击、弹窗、轮播图等交互效果</div>
            </div>
        </div>
    </div>

    <script>
        function playVideo(title, videoUrl) {
            // 增加容错：如果传参为空，提示用户
            if (!videoUrl) {
                alert('视频路径错误，请检查文件名！');
                return;
            }
            document.getElementById('videoPlayer').style.display = 'block';
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playVideo').src = videoUrl;
            // 修复：自动播放加try-catch，避免浏览器限制
            try {
                document.getElementById('playVideo').play();
            } catch (e) {
                console.log('自动播放被浏览器限制，请手动点击播放');
            }
        }

        function searchVideos() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const videoCards = document.querySelectorAll('.video-card');
            
            videoCards.forEach(card => {
                const title = card.querySelector('.video-title').innerText.toLowerCase();
                if (title.includes(keyword) || keyword === '') {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                searchVideos();
            }
        });
    </script>
</body>
</html>
